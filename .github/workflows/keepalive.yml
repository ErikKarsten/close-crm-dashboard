name: Keep Streamlit Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit Dashboard
        run: |
          curl -s https://close-crm-dashboard.streamlit.app > /dev/null
          echo "Pinged at $(date)"
